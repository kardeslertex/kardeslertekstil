<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Kardeşler Tekstil — UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" type="image/svg+xml" href="../../assets/logo-monogram.svg">
  <style>
    html,body{margin:0;padding:0;background:var(--cream-100);}
    *,*::before,*::after{box-sizing:border-box;}
    button{font-family:inherit;}
    select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--fg2) 50%),linear-gradient(135deg,var(--fg2) 50%,transparent 50%);background-position:calc(100% - 16px) 50%,calc(100% - 12px) 50%;background-size:4px 4px,4px 4px;background-repeat:no-repeat;padding-right:32px;}
    .demo-bar{position:sticky;bottom:0;left:0;right:0;background:var(--ink);color:var(--cream-100);padding:10px 20px;font-family:var(--font-body);font-size:11px;letter-spacing:.12em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;z-index:40;}
    .demo-bar span b{color:var(--orange-500);}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Pages.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [route, setRoute] = useState(() => localStorage.getItem('kt_route') || 'home');
      useEffect(() => { localStorage.setItem('kt_route', route); window.scrollTo(0,0); }, [route]);

      return (
        <>
          <Header route={route} onNavigate={setRoute}/>
          {route === 'home' && (
            <>
              <Hero onNavigate={setRoute}/>
              <ProductGrid onNavigate={setRoute}/>
              <AboutStrip/>
              <ReferencesMarquee/>
              <ContactBlock/>
            </>
          )}
          {route === 'products' && <ProductsPage onNavigate={setRoute}/>}
          {route === 'references' && <ReferencesPage/>}
          {route === 'about' && <AboutPage/>}
          {route === 'contact' && <ContactPage/>}
          <Footer onNavigate={setRoute}/>
          <WhatsAppFAB/>
          <div className="demo-bar" data-screen-label={route}>
            <span>UI Kit · <b>{route.toUpperCase()}</b></span>
            <span>Kardeşler Tekstil · Proposed direction — not client-approved</span>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
