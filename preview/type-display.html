<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:20px 28px;display:flex;flex-direction:column;gap:10px;min-height:180px;justify-content:center;}
  .big{font-family:var(--font-display);font-size:72px;line-height:.95;letter-spacing:-1px;color:var(--navy-700);text-transform:uppercase;}
  .meta{display:flex;gap:24px;align-items:baseline;color:var(--fg2);font-size:13px;}
  .meta b{color:var(--fg1);font-weight:600;}
</style></head><body>
<div class="card">
  <div class="big">1982</div>
  <div class="meta"><b>Archivo Black</b> · Display · 400 · uppercase · tracking -1%</div>
</div>
</body></html>
