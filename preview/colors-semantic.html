<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:18px 24px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .tok{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#fff;border:1px solid var(--steel-200);border-radius:var(--radius-md);}
  .dot{width:28px;height:28px;border-radius:var(--radius-sm);flex-shrink:0;border:1px solid rgba(0,0,0,.06);}
  .k{font-family:var(--font-mono);font-size:12px;color:var(--fg1);}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-left:auto;}
</style></head><body>
<div class="card">
  <div class="tok"><div class="dot" style="background:#F3EEE4;"></div><div class="k">--bg</div><div class="v">cream-100</div></div>
  <div class="tok"><div class="dot" style="background:#0E2A44;"></div><div class="k">--bg-inverse</div><div class="v">navy-700</div></div>
  <div class="tok"><div class="dot" style="background:#111418;"></div><div class="k">--fg1</div><div class="v">ink</div></div>
  <div class="tok"><div class="dot" style="background:#434A53;"></div><div class="k">--fg2</div><div class="v">steel-600</div></div>
  <div class="tok"><div class="dot" style="background:#E6662A;"></div><div class="k">--fg-accent</div><div class="v">orange-500</div></div>
  <div class="tok"><div class="dot" style="background:#D6D9DE;"></div><div class="k">--border</div><div class="v">steel-200</div></div>
  <div class="tok"><div class="dot" style="background:#1F7A4C;"></div><div class="k">--success</div><div class="v">#1F7A4C</div></div>
  <div class="tok"><div class="dot" style="background:#B92133;"></div><div class="k">--danger</div><div class="v">red-500</div></div>
  <div class="tok"><div class="dot" style="background:#25D366;"></div><div class="k">--whatsapp</div><div class="v">#25D366</div></div>
  <div class="tok"><div class="dot" style="background:#0E2A44;"></div><div class="k">--border-focus</div><div class="v">navy-700</div></div>
</div>
</body></html>
