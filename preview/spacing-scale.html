<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:18px 24px;}
  .row{display:flex;align-items:center;gap:12px;padding:4px 0;}
  .bar{background:var(--navy-700);height:14px;border-radius:2px;}
  .k{font-family:var(--font-mono);font-size:11px;color:var(--fg1);width:90px;flex-shrink:0;}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--fg3);width:44px;flex-shrink:0;text-align:right;}
</style></head><body>
<div class="card">
  <div class="row"><div class="k">--space-1</div><div class="v">4px</div><div class="bar" style="width:4px;"></div></div>
  <div class="row"><div class="k">--space-2</div><div class="v">8px</div><div class="bar" style="width:8px;"></div></div>
  <div class="row"><div class="k">--space-3</div><div class="v">12px</div><div class="bar" style="width:12px;"></div></div>
  <div class="row"><div class="k">--space-4</div><div class="v">16px</div><div class="bar" style="width:16px;"></div></div>
  <div class="row"><div class="k">--space-5</div><div class="v">24px</div><div class="bar" style="width:24px;"></div></div>
  <div class="row"><div class="k">--space-6</div><div class="v">32px</div><div class="bar" style="width:32px;"></div></div>
  <div class="row"><div class="k">--space-7</div><div class="v">48px</div><div class="bar" style="width:48px;"></div></div>
  <div class="row"><div class="k">--space-8</div><div class="v">64px</div><div class="bar" style="width:64px;"></div></div>
  <div class="row"><div class="k">--space-9</div><div class="v">96px</div><div class="bar" style="width:96px;"></div></div>
  <div class="row"><div class="k">--space-10</div><div class="v">128px</div><div class="bar" style="width:128px;"></div></div>
</div>
</body></html>
