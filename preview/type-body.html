<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:20px 28px;display:flex;flex-direction:column;gap:8px;min-height:180px;justify-content:center;}
  .line{font-family:var(--font-body);color:var(--fg1);}
  .w400{font-weight:400}.w500{font-weight:500}.w600{font-weight:600}.w700{font-weight:700}
  .meta{display:flex;gap:20px;color:var(--fg2);font-size:12px;margin-top:6px;}
</style></head><body>
<div class="card">
  <div class="line w400" style="font-size:22px;">Kurumsal firmalara özel üretim. 400 Regular</div>
  <div class="line w500" style="font-size:22px;">Kurumsal firmalara özel üretim. 500 Medium</div>
  <div class="line w600" style="font-size:22px;">Kurumsal firmalara özel üretim. 600 SemiBold</div>
  <div class="line w700" style="font-size:22px;">Kurumsal firmalara özel üretim. 700 Bold</div>
  <div class="meta"><b>Inter Tight</b> · Body + UI · 400/500/600/700</div>
</div>
</body></html>
