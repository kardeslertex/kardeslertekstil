<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .slot{height:130px;border-radius:4px;overflow:hidden;position:relative;}
  .stripes-cream{background-image:repeating-linear-gradient(135deg,#E8E0CF 0 14px,#F3EEE4 14px 28px);}
  .stripes-navy{background-image:repeating-linear-gradient(135deg,#0E2A44 0 14px,#1C3E5C 14px 28px);}
  .tag{position:absolute;left:10px;bottom:10px;font-family:var(--font-body);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 6px;border-radius:2px;}
  .tcream{background:rgba(14,42,68,.9);color:#F3EEE4;}
  .tnavy{background:rgba(243,238,228,.9);color:#0E2A44;}
</style></head><body>
<div class="card">
  <div class="slot stripes-cream"><span class="tag tcream">Cream · divider</span></div>
  <div class="slot stripes-navy"><span class="tag tnavy">Navy · empty state</span></div>
</div>
</body></html>
