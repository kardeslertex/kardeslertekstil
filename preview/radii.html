<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:18px 24px;display:flex;gap:18px;align-items:flex-end;}
  .tok{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sq{width:72px;height:72px;background:var(--navy-700);}
  .k{font-family:var(--font-mono);font-size:11px;color:var(--fg1);}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
</style></head><body>
<div class="card">
  <div class="tok"><div class="sq" style="border-radius:2px;"></div><div class="k">--radius-sm</div><div class="v">2px · buttons</div></div>
  <div class="tok"><div class="sq" style="border-radius:4px;"></div><div class="k">--radius-md</div><div class="v">4px · cards</div></div>
  <div class="tok"><div class="sq" style="border-radius:8px;"></div><div class="k">--radius-lg</div><div class="v">8px · modal</div></div>
  <div class="tok"><div class="sq" style="border-radius:12px;"></div><div class="k">--radius-xl</div><div class="v">12px</div></div>
  <div class="tok"><div class="sq" style="border-radius:999px;"></div><div class="k">--radius-full</div><div class="v">avatars only</div></div>
</div>
</body></html>
