<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Primary colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:18px 24px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--steel-200);}
  .chip{height:90px;display:flex;align-items:flex-end;padding:10px 12px;color:#fff;font-family:var(--font-display);font-size:20px;text-transform:uppercase;letter-spacing:-.01em;}
  .meta{padding:10px 12px;background:#fff;}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--fg1);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg2);margin-top:2px;}
  .usage{font-size:11px;color:var(--fg3);margin-top:4px;}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0E2A44;">Navy 700</div><div class="meta"><div class="name">Workshop Navy</div><div class="hex">#0E2A44</div><div class="usage">Primary · headers · buttons</div></div></div>
    <div class="sw"><div class="chip" style="background:#E6662A;">Orange 500</div><div class="meta"><div class="name">Hi-Vis Orange</div><div class="hex">#E6662A</div><div class="usage">Accent · CTA · rules</div></div></div>
    <div class="sw"><div class="chip" style="background:#B92133;">Red 500</div><div class="meta"><div class="name">Bolt Red</div><div class="hex">#B92133</div><div class="usage">Alerts · wordmark dot</div></div></div>
  </div>
</div>
</body></html>
