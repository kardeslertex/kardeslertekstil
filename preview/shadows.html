<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:28px 24px;display:flex;gap:28px;}
  .tok{display:flex;flex-direction:column;gap:10px;}
  .sq{width:180px;height:70px;background:#fff;border:1px solid var(--steel-200);border-radius:var(--radius-md);}
  .s1{box-shadow:0 1px 2px rgba(17,20,24,.06);}
  .s2{box-shadow:0 4px 16px rgba(14,42,68,.12);}
  .k{font-family:var(--font-mono);font-size:11px;color:var(--fg1);}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
</style></head><body>
<div class="card">
  <div class="tok"><div class="sq"></div><div class="k">(none)</div><div class="v">resting default</div></div>
  <div class="tok"><div class="sq s1"></div><div class="k">--shadow-1</div><div class="v">0 1px 2px / 6%</div></div>
  <div class="tok"><div class="sq s2"></div><div class="k">--shadow-2</div><div class="v">0 4px 16px / 12% — hover</div></div>
</div>
</body></html>
