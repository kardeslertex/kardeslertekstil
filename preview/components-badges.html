<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:18px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .b{font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:2px;display:inline-flex;gap:6px;align-items:center;}
  .solid{background:var(--navy-700);color:var(--cream-50);}
  .accent{background:var(--orange-500);color:#fff;}
  .outline{border:1px solid var(--steel-300);color:var(--fg2);background:#fff;}
  .stripe{background:var(--cream-200);color:var(--navy-700);}
  .danger{background:var(--red-500);color:#fff;}
  .success{background:#E4F1EA;color:var(--success);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
</style></head><body>
<div class="card">
  <span class="b solid">EST. 1982</span>
  <span class="b accent">Yeni</span>
  <span class="b outline">Kurumsal</span>
  <span class="b stripe">Numune Mevcut</span>
  <span class="b danger"><span class="dot"></span>Stokta Yok</span>
  <span class="b success"><span class="dot"></span>Hazır</span>
  <span class="b outline">T-Shirt</span>
  <span class="b outline">Tulum</span>
  <span class="b outline">Önlük</span>
  <span class="b outline">Polar</span>
  <span class="b outline">+2</span>
</div>
</body></html>
