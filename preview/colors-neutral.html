<!doctype html><html lang="tr"><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cream-100);}
  .card{padding:18px 24px;}
  .label{font-family:var(--font-body);font-size:11px;letter-spacing:.08em;color:var(--fg3);text-transform:uppercase;margin-bottom:8px;}
  .row{display:grid;grid-template-columns:repeat(11,1fr);gap:4px;margin-bottom:14px;}
  .sw{height:56px;border-radius:var(--radius-sm);position:relative;border:1px solid rgba(0,0,0,.06);}
  .sw span{position:absolute;bottom:4px;left:6px;font-family:var(--font-mono);font-size:9px;color:var(--fg2);}
  .sw.dark span{color:rgba(255,255,255,.9);}
</style></head><body>
<div class="card">
  <div class="label">Cream (surface)</div>
  <div class="row" style="grid-template-columns:repeat(3,1fr);">
    <div class="sw" style="background:#FAF7F1;"><span>50 · #FAF7F1</span></div>
    <div class="sw" style="background:#F3EEE4;"><span>100 · #F3EEE4</span></div>
    <div class="sw" style="background:#E8E0CF;"><span>200 · #E8E0CF</span></div>
  </div>
  <div class="label">Steel (chrome &amp; text)</div>
  <div class="row">
    <div class="sw" style="background:#F5F6F7;"><span>50</span></div>
    <div class="sw" style="background:#EAECEE;"><span>100</span></div>
    <div class="sw" style="background:#D6D9DE;"><span>200</span></div>
    <div class="sw" style="background:#B6BCC4;"><span>300</span></div>
    <div class="sw" style="background:#8A929C;"><span>400</span></div>
    <div class="sw dark" style="background:#5F6770;"><span>500</span></div>
    <div class="sw dark" style="background:#434A53;"><span>600</span></div>
    <div class="sw dark" style="background:#2B3138;"><span>700</span></div>
    <div class="sw dark" style="background:#111418;"><span>Ink</span></div>
    <div class="sw dark" style="background:#0D1014;"><span>900</span></div>
    <div class="sw" style="background:#FFFFFF;"><span>#FFF</span></div>
  </div>
</div>
</body></html>
